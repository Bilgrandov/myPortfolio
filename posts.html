<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bilgrandov's Tech Corner — Posts & Thoughts">
  <meta name="theme-color" content="#245edb">
  <title>★ Bilgrandov's Tech Corner ★ ~ Posts</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=Kosugi+Maru&display=swap">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="assets/xp.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body>
  <div class="crt-overlay"></div>
  <img src="assets/work_sticker.webp" class="work-badge" alt="Open to Work" width="130" height="130" loading="lazy">
  <canvas id="sparkle-canvas" aria-hidden="true"></canvas>

  <main class="page-container">
    <!-- New Post Window (Admin Only) -->
    <div id="admin-compose-window" class="window main-window hidden" hidden style="margin-bottom: 16px; display: none;">
      <div class="title-bar">
        <div class="title-bar-text">📝 New Post — compose.exe</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body">
        <div class="post-form">
          <label for="post-title">Title:</label>
          <input type="text" id="post-title" placeholder="What's on your mind?">

          <label for="post-content">Content:</label>
          <textarea id="post-content" placeholder="Write anything you want here~ (◠‿◠)"></textarea>

          <div class="form-actions">
            <button type="button" id="post-submit">📋 Generate JSON</button>
            <button type="button" id="post-clear">🗑️ Clear</button>
          </div>
          <div id="json-output-container" class="hidden" style="margin-top: 10px;">
            <label>Copy this to data/posts.json:</label>
            <textarea id="json-output" readonly style="height: 100px; font-family: monospace; font-size: 11px;"></textarea>
            <button type="button" id="copy-json-btn">🖇️ Copy to Clipboard</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Posts Explorer Window -->
    <div class="window main-window">
      <div class="title-bar">
        <div class="title-bar-text">📂 Explorer — C:\MyDocuments\Blog_Posts</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body" style="padding: 0;">
        <div class="explorer-container">
          <!-- Sidebar: Navigation Tree -->
          <div class="explorer-sidebar">
            <div class="search-container">
              <input type="text" id="post-search" placeholder="Search posts...">
            </div>
            <div class="tree-container">
              <ul class="tree-view" id="posts-tree">
                <!-- Tree items will be injected here -->
                <li>Loading...</li>
              </ul>
            </div>
          </div>

          <!-- Main Content: Post Viewer -->
          <div class="explorer-content" id="post-viewer">
            <div class="explorer-index" id="explorer-index">
              <h2>Select a post to read</h2>
              <p>Or browse the latest below:</p>
              <div id="index-posts-list">
                <!-- Index items will be injected here -->
              </div>
            </div>
            <div class="explorer-post hidden" id="single-post-view">
              <div class="explorer-post-header">
                <button id="nav-home" style="margin-bottom: 12px; cursor: pointer;">🔙 Back to Posts</button>
                <h2 id="view-title">Post Title</h2>
                <div class="explorer-post-meta">
                  <span id="view-date">Date</span> • <span id="view-category">Category</span>
                </div>
              </div>
              <div class="post-body" id="view-content">
                <!-- Markdown content here -->
              </div>
              <div class="content-pagination">
                <button id="nav-prev">◀ Previous</button>
                <button id="nav-next">Next ▶</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="window-footer">
        <span><img src="assets/profile.jpg" class="footer-mascot" alt="" loading="lazy" width="24" height="24"><span id="post-count">0</span> items total</span>
        <span>～ Computer\Blog_Posts ～</span>
      </div>
    </div>
  </main>

  <!-- Taskbar -->
  <nav class="taskbar">
    <button class="start-btn" type="button">
      <span class="start-icon">🪟</span> Start
    </button>
    <div class="taskbar-divider"></div>
    <div class="taskbar-links">
      <a href="index.html" class="taskbar-link"><span class="link-icon">🏠</span> <span>Home</span></a>
      <a href="skills.html" class="taskbar-link"><span class="link-icon">⚡</span> <span>Skills</span></a>
      <a href="projects.html" class="taskbar-link"><span class="link-icon">📁</span> <span>Projects</span></a>
      <a href="posts.html" class="taskbar-link active"><span class="link-icon">📝</span> <span>Posts</span></a>
      <a href="contact.html" class="taskbar-link"><span class="link-icon">💌</span> <span>Contact</span></a>
    </div>
    <button id="theme-switcher" class="theme-switcher-btn" title="Switch Theme">💿</button>
    <div class="taskbar-clock" id="taskbar-clock">12:00</div>
  </nav>

  <!-- Login Modal (Hidden) -->
  <div id="login-modal" class="login-overlay hidden">
    <div class="window" style="width: 300px;">
      <div class="title-bar">
        <div class="title-bar-text">🔐 Admin Login</div>
        <div class="title-bar-controls">
          <button aria-label="Close" id="close-login"></button>
        </div>
      </div>
      <div class="window-body">
        <div class="field-row-stacked">
          <label for="admin-password">Password:</label>
          <input id="admin-password" type="password" style="width: 100%;">
        </div>
        <div class="field-row" style="justify-content: flex-end; margin-top: 10px;">
          <button id="login-submit">Login</button>
          <button id="login-cancel">Cancel</button>
        </div>
        <p id="login-error" class="hidden" style="color: red; font-size: 11px; margin-top: 8px;">Incorrect password! ❌</p>
      </div>
    </div>
  </div>


  <script src="script.js" defer></script>
</body>
</html>
