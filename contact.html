<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bilgrandov's Tech Corner — Contact & Social Links">
  <meta name="theme-color" content="#245edb">
  <title>★ Bilgrandov's Tech Corner ★ ~ Contact</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=Kosugi+Maru&display=swap">
  <link rel="stylesheet" href="assets/xp.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="crt-overlay"></div>
  <img src="assets/work_sticker.webp" class="work-badge" alt="Open to Work" width="130" height="130" loading="lazy">
  <canvas id="sparkle-canvas" aria-hidden="true"></canvas>

  <main class="page-container">
    <div class="window main-window">
      <div class="title-bar">
        <div class="title-bar-text">💌 Contact — send_mail.exe</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body">

        <p class="contact-intro">Want to work together or just say hi? Drop me a line! (◕‿◕✿)
        </p>

        <fieldset>
          <legend>Contact Links</legend>
          <div class="contact-grid">
            <a href="mailto:Bilgrandov9902003@gmail.com" target="_blank" class="contact-item-badge">
              <img src="assets/icons/gmail.svg" alt="Gmail" width="48" height="48">
            </a>
            <a href="https://github.com/bilgrandov" target="_blank" rel="noopener" class="contact-item-badge">
              <img src="assets/icons/github.svg" alt="GitHub" width="48" height="48">
            </a>
            <a href="https://www.linkedin.com/in/bilgrandov/" target="_blank" rel="noopener" class="contact-item-badge">
              <img src="assets/icons/linkedin.svg" alt="LinkedIn" width="48" height="48">
            </a>
            <a href="https://www.instagram.com/mentor_hayalan/" target="_blank" rel="noopener" class="contact-item-badge">
              <img src="assets/icons/instagram.svg" alt="Instagram" width="48" height="48">
            </a>
          </div>
        </fieldset>

        <div class="guestbook-section hidden">
          <h3>★ Guestbook ★</h3>
          <div class="guestbook-form">
            <textarea id="guestbook-input" rows="2" placeholder="Leave a nice message~ (◠‿◠)"></textarea>
            <button type="button" id="guestbook-submit">✉ Sign!</button>
          </div>
          <div id="guestbook-messages" class="guestbook-messages"></div>
        </div>

      </div>
      <div class="window-footer">
        <span><img src="assets/profile.jpg" class="footer-mascot" alt="" loading="lazy" width="24" height="24">～ See you next time! ～</span>
        <span>Best viewed in 800×600</span>
      </div>
    </div>
  </main>

  <!-- Taskbar -->
  <nav class="taskbar">
    <button class="start-btn" type="button">
      <span class="start-icon">🪟</span> Start
    </button>
    <div class="taskbar-divider"></div>
    <div class="taskbar-links">
      <a href="index.html" class="taskbar-link"><span class="link-icon">🏠</span> <span>Home</span></a>
      <a href="skills.html" class="taskbar-link"><span class="link-icon">⚡</span> <span>Skills</span></a>
      <a href="projects.html" class="taskbar-link"><span class="link-icon">📁</span> <span>Projects</span></a>
      <a href="posts.html" class="taskbar-link"><span class="link-icon">📝</span> <span>Posts</span></a>
      <a href="contact.html" class="taskbar-link active"><span class="link-icon">💌</span> <span>Contact</span></a>
    </div>
    <button id="theme-switcher" class="theme-switcher-btn" title="Switch Theme">💿</button>
    <div class="taskbar-clock" id="taskbar-clock">12:00</div>
  </nav>

  <script src="script.js" defer></script>
</body>

</html>
