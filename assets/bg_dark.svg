<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#000510"/>
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>
  <ellipse cx="20%" cy="30%" rx="40%" ry="50%" fill="#00ffff" fill-opacity="0.2" filter="url(#blur)"/>
  <ellipse cx="80%" cy="70%" rx="40%" ry="50%" fill="#0000ff" fill-opacity="0.2" filter="url(#blur)"/>
  <ellipse cx="50%" cy="50%" rx="30%" ry="40%" fill="#50ffaa" fill-opacity="0.1" filter="url(#blur)"/>
</svg>
