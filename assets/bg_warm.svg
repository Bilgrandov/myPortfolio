<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0E0E6; stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sun1" cx="0%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:#fffcec; stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#fffcec; stop-opacity:0" />
    </radialGradient>
    <radialGradient id="sun2" cx="100%" cy="100%" r="60%">
